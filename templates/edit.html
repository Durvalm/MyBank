{% extends "base.html" %}

{% block content %}
<section class="hero">
  <div>
    <p class="eyebrow">Edit</p>
    <h1>Update transaction.</h1>
    <p class="subhead">Make changes and save to update your records.</p>
  </div>
  <div class="hero-card">
    <form class="form" action="{{ url_for('edit_transaction', tx_id=tx.id) }}" method="post">
      <label>
        Amount
        <input type="number" name="amount" step="0.01" min="0" value="{{ tx.amount }}" required />
      </label>

      <div class="toggle">
        <label>
          <input type="radio" name="type" value="income" {% if tx.type == 'income' %}checked{% endif %} required />
          <span>Income</span>
        </label>
        <label>
          <input type="radio" name="type" value="spending" {% if tx.type == 'spending' %}checked{% endif %} required />
          <span>Spending</span>
        </label>
      </div>

      <label>
        Category
        <select name="category" data-current-category="{{ tx.category }}" required></select>
      </label>

      <label>
        Description
        <input type="text" name="description" value="{{ tx.description }}" />
      </label>

      <label>
        Date
        <input type="date" name="date" value="{{ tx.date }}" />
      </label>

      <button type="submit">Save Changes</button>
    </form>
  </div>
</section>

<script>
  const categoryChoices = {
    income: {{ income_categories|tojson }},
    spending: {{ spending_categories|tojson }},
  };

  const formatCategory = (category) => {
    return category
      .split("_")
      .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
      .join(" ");
  };

  const syncCategoryOptions = (form) => {
    const categorySelect = form.querySelector("select[name='category']");
    const selectedType = form.querySelector("input[name='type']:checked")?.value;
    const currentValue = categorySelect.dataset.currentCategory || categorySelect.value;
    categorySelect.innerHTML = "";

    if (!selectedType) {
      categorySelect.disabled = true;
      categorySelect.add(new Option("Choose a type first", ""));
      return;
    }

    categorySelect.disabled = false;
    categorySelect.add(new Option("Choose a category", ""));
    categoryChoices[selectedType].forEach((category) => {
      categorySelect.add(new Option(formatCategory(category), category));
    });

    if (categoryChoices[selectedType].includes(currentValue)) {
      categorySelect.value = currentValue;
    }
    categorySelect.dataset.currentCategory = "";
  };

  document.querySelectorAll(".form").forEach((form) => {
    form.querySelectorAll("input[name='type']").forEach((input) => {
      input.addEventListener("change", () => syncCategoryOptions(form));
    });
    syncCategoryOptions(form);
  });
</script>
{% endblock %}
